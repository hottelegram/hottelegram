<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotTelegram — Acesso VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e50914;
    --orange: #ff6b1a;
    --gold: #f5a623;
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --text: #ffffff;
    --muted: #888;
    --tg: #229ED9;
    --tg-dark: #1a7fb5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
  }

  /* ══ BACKGROUND GRID GLOW ══ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(229,9,20,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(229,9,20,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ══ HERO ══ */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px 80px;
    z-index: 1;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 55% at 50% -5%, rgba(229,9,20,0.22) 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,107,26,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(229,9,20,0.06) 0%, transparent 60%);
    z-index: -1;
  }

  /* animated ember particles via CSS */
  .embers {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: -1;
    pointer-events: none;
  }

  .ember {
    position: absolute;
    bottom: -10px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #ff6b1a;
    animation: rise linear infinite;
    opacity: 0;
  }

  @keyframes rise {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-70vh) translateX(var(--drift)) scale(0.2); opacity: 0; }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(229,9,20,0.12);
    border: 1px solid rgba(229,9,20,0.35);
    color: #ff5555;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 6px 18px;
    border-radius: 50px;
    margin-bottom: 32px;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: #ff5555;
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  .hero-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 15vw, 130px);
    line-height: 0.88;
    letter-spacing: 3px;
    background: linear-gradient(150deg, #ffffff 0%, #ffb347 35%, #e50914 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 60px rgba(229,9,20,0.45));
  }

  .hero-sub {
    font-size: clamp(11px, 2.5vw, 14px);
    font-weight: 400;
    color: #666;
    margin-top: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .hero-headline {
    font-size: clamp(20px, 4.5vw, 38px);
    font-weight: 800;
    line-height: 1.25;
    margin-top: 36px;
    max-width: 680px;
  }

  .hero-headline em {
    font-style: normal;
    background: linear-gradient(90deg, #ff6b1a, #e50914);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: clamp(14px, 2vw, 16px);
    color: #aaa;
    max-width: 520px;
    margin-top: 18px;
    line-height: 1.75;
  }

  .cta-row {
    display: flex;
    gap: 14px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-fire {
    background: linear-gradient(135deg, #ff6b1a 0%, #e50914 100%);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 38px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 28px rgba(229,9,20,0.45);
  }

  .btn-fire:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 40px rgba(229,9,20,0.6);
  }

  .btn-tg {
    background: var(--tg);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 38px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 4px 22px rgba(34,158,217,0.35);
  }

  .btn-tg:hover {
    transform: translateY(-3px) scale(1.03);
    background: var(--tg-dark);
    box-shadow: 0 10px 32px rgba(34,158,217,0.5);
  }

  /* ══ STATS ══ */
  .stats {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    background: var(--bg2);
    border-top: 1px solid #1c1c1c;
    border-bottom: 1px solid #1c1c1c;
    position: relative;
    z-index: 1;
  }

  .stat-item {
    padding: 26px 38px;
    text-align: center;
    border-right: 1px solid #1c1c1c;
    flex: 1;
    min-width: 130px;
  }

  .stat-item:last-child { border-right: none; }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    background: linear-gradient(135deg, #ff6b1a, #e50914);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 3px;
  }

  /* ══ SECTIONS ══ */
  .section {
    padding: 80px 20px;
    position: relative;
    z-index: 1;
  }

  .section-alt { background: var(--bg2); }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 6vw, 50px);
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .section-title em {
    font-style: normal;
    background: linear-gradient(90deg, #ff6b1a, #e50914);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-sub {
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 50px;
    max-width: 460px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ══ CATEGORIES — Netflix rows ══ */
  .cat-row-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: #ddd;
    margin-bottom: 14px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cat-row-label span {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(229,9,20,0.15);
    border: 1px solid rgba(229,9,20,0.3);
    color: #ff5555;
    padding: 3px 10px;
    border-radius: 50px;
  }

  .cat-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 10px;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .cat-scroll::-webkit-scrollbar { display: none; }

  .cat-card {
    flex-shrink: 0;
    width: 160px;
    height: 100px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    scroll-snap-align: start;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
  }

  .cat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(229,9,20,0.12), transparent);
    opacity: 0;
    transition: opacity .2s;
  }

  .cat-card:hover {
    transform: scale(1.06);
    border-color: rgba(229,9,20,0.5);
    box-shadow: 0 6px 24px rgba(229,9,20,0.2);
  }

  .cat-card:hover::before { opacity: 1; }

  .cat-card-icon { font-size: 28px; }

  .cat-card-name {
    font-size: 12px;
    font-weight: 600;
    color: #ccc;
    text-align: center;
    padding: 0 8px;
    line-height: 1.3;
  }

  .cat-lock {
    position: absolute;
    top: 7px; right: 8px;
    font-size: 12px;
    color: #555;
  }

  .cat-row-wrap {
    max-width: 1000px;
    margin: 0 auto 44px;
  }

  /* ══ FELCA SECTION ══ */
  .felca-section {
    background: linear-gradient(135deg, #0e0202, #130505);
    border-top: 1px solid rgba(229,9,20,0.2);
    border-bottom: 1px solid rgba(229,9,20,0.2);
    padding: 80px 20px;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .felca-section::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(229,9,20,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .felca-inner {
    max-width: 820px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: center;
  }

  @media (max-width: 680px) {
    .felca-inner { grid-template-columns: 1fr; }
  }

  .felca-left .section-title { text-align: left; }
  .felca-left .section-sub { text-align: left; margin-left: 0; margin-bottom: 0; }

  .felca-alert {
    background: rgba(229,9,20,0.08);
    border: 1px solid rgba(229,9,20,0.25);
    border-radius: 18px;
    padding: 28px 26px;
  }

  .felca-alert-title {
    font-weight: 800;
    font-size: 15px;
    color: #ff5555;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .felca-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .felca-list li {
    font-size: 14px;
    color: #bbb;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }

  .felca-list li::before {
    content: '✕';
    color: #e50914;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .felca-solution {
    background: rgba(229,9,20,0.06);
    border: 1px solid rgba(229,9,20,0.2);
    border-radius: 18px;
    padding: 24px 22px;
    margin-top: 18px;
  }

  .felca-solution-title {
    font-weight: 700;
    font-size: 14px;
    color: #ff9a3c;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .felca-solution p {
    font-size: 13px;
    color: #999;
    line-height: 1.65;
  }

  /* ══ OFFERS ══ */
  .offers-grid {
    display: flex;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-end;
  }

  .offer-card {
    background: var(--bg3);
    border: 1px solid #222;
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    flex: 1;
    min-width: 230px;
    max-width: 275px;
    transition: transform .25s, border-color .3s, box-shadow .3s;
    position: relative;
    overflow: hidden;
  }

  .offer-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff6b1a, #e50914);
    opacity: 0;
    transition: opacity .3s;
  }

  .offer-card:hover { transform: translateY(-8px); border-color: rgba(229,9,20,0.4); box-shadow: 0 16px 48px rgba(229,9,20,0.18); }
  .offer-card:hover::before { opacity: 1; }

  .offer-card.featured { border-color: rgba(229,9,20,0.5); box-shadow: 0 8px 40px rgba(229,9,20,0.22); transform: scale(1.04); }
  .offer-card.featured::before { opacity: 1; }

  .offer-tag {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b1a, #e50914);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 50px;
    margin-bottom: 18px;
  }

  .offer-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: #ccc;
    margin-bottom: 18px;
  }

  .offer-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #ffb347 55%, #e50914 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .offer-prefix { font-size: 20px; font-family: 'Outfit', sans-serif; font-weight: 300; -webkit-text-fill-color: #999; }
  .offer-cents { font-size: 28px; }
  .offer-period { font-size: 12px; color: var(--muted); margin-top: 6px; margin-bottom: 24px; }

  .offer-perks { list-style: none; margin-bottom: 28px; }
  .offer-perks li { font-size: 13px; color: #aaa; padding: 7px 0; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; text-align: left; }
  .offer-perks li::before { content: '✦'; color: #e50914; font-size: 9px; flex-shrink: 0; }

  /* ══ HOW IT WORKS ══ */
  .steps {
    display: flex;
    gap: 0;
    max-width: 800px;
    margin: 0 auto;
    flex-wrap: wrap;
    justify-content: center;
  }

  .step { flex: 1; min-width: 160px; text-align: center; padding: 20px; position: relative; }

  .step:not(:last-child)::after {
    content: '→';
    position: absolute;
    right: -6px; top: 28px;
    color: #2a2a2a;
    font-size: 24px;
  }

  .step-num {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, #ff6b1a, #e50914);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    margin: 0 auto 16px;
    box-shadow: 0 4px 20px rgba(229,9,20,0.38);
  }

  .step-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.55; }

  /* ══ URGENCY STRIP ══ */
  .urgency {
    background: linear-gradient(135deg, #110000, #1a0200);
    border-top: 1px solid rgba(229,9,20,0.25);
    border-bottom: 1px solid rgba(229,9,20,0.25);
    padding: 26px 20px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .urgency p { font-size: clamp(13px, 2.8vw, 17px); font-weight: 600; }
  .urgency em { font-style: normal; color: #ff6b1a; }

  /* ══ FINAL CTA ══ */
  .final-cta {
    padding: 100px 20px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .final-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 65% 55% at 50% 50%, rgba(229,9,20,0.09) 0%, transparent 70%);
    z-index: -1;
  }

  /* ══ FOOTER ══ */
  footer {
    background: #070707;
    border-top: 1px solid #181818;
    padding: 28px 20px;
    text-align: center;
    font-size: 12px;
    color: #3a3a3a;
    position: relative;
    z-index: 1;
  }

  footer a { color: #555; text-decoration: none; }

  /* ══ SCROLL REVEAL ══ */
  .fade-up { opacity: 0; transform: translateY(28px); transition: opacity .6s ease, transform .6s ease; }
  .fade-up.visible { opacity: 1; transform: translateY(0); }

  /* ══ RESPONSIVE ══ */
  @media (max-width: 600px) {
    .stat-item { padding: 18px 16px; }
    .step:not(:last-child)::after { display: none; }
    .offer-card.featured { transform: scale(1); }
    .offers-grid { flex-direction: column; align-items: center; }
    .offer-card { max-width: 100%; width: 100%; }
  }

  /* ══ BANNER ══ */
  .banner-slot {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
  }

  .banner-slot-inner {
    max-width: 1000px;
    margin: 0 auto;
  }

  .banner-img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 16px;
    display: block;
    border: 1px solid #222;
  }

  .banner-img-tall {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 16px;
    display: block;
    border: 1px solid #222;
  }

  .banner-label {
    font-size: 10px;
    color: #333;
    text-align: right;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ══ CAT CARD COM IMAGEM ══ */
  .cat-card-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    opacity: 0.45;
    transition: opacity .2s;
  }

  .cat-card:hover .cat-card-img { opacity: 0.6; }

  .cat-card-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 4px;
    width: 100%;
    height: 100%;
    padding-bottom: 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 55%, transparent 100%);
    border-radius: 10px;
  }

  .cat-card-name {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    padding: 0 8px;
    line-height: 1.3;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }


  /* ══ BANNER RESPONSIVO ══ */
  .banner-desktop { display: block; }
  .banner-mobile  { display: none; }

  @media (max-width: 768px) {
    .banner-desktop { display: none; }
    .banner-mobile  { display: block; }
  }

  /* ══ CAT GRID DESKTOP ══ */
  .cat-grid-desktop {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    max-width: 1000px;
    margin: 0 auto 44px;
  }

  .cat-grid-desktop .cat-card {
    width: 100%;
    height: 130px;
    border-radius: 14px;
  }

  .cat-grid-desktop .cat-card-img {
    border-radius: 14px;
  }

  .cat-grid-section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: #ddd;
    margin-bottom: 14px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
  }

  .cat-grid-section-label span {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(229,9,20,0.15);
    border: 1px solid rgba(229,9,20,0.3);
    color: #ff5555;
    padding: 3px 10px;
    border-radius: 50px;
  }

  .cat-desktop-wrapper {
    padding: 0 20px;
  }

  /* Ocultar desktop no mobile, mostrar scroll */
  @media (max-width: 768px) {
    .cat-desktop-wrapper { display: none; }
    .cat-mobile-wrapper  { display: block; }
  }

  @media (min-width: 769px) {
    .cat-desktop-wrapper { display: block; }
    .cat-mobile-wrapper  { display: none; }
  }


    /* Trava de interface do protetor de conteudo */
    *, html, body {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
